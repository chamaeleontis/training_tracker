<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Gym Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f0f0f;--card:#1a1a1a;--card2:#222;--card3:#2a2a2a;
  --accent:#e8ff47;--accent2:#ff6b35;--purple:#a78bfa;
  --text:#f0f0f0;--muted:#777;--border:#2e2e2e;
  --green:#4ade80;--red:#f87171;--blue:#60a5fa;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;overscroll-behavior:none}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}

/* HEADER */
.header{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);padding:12px 16px 10px;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:18px;font-weight:800;letter-spacing:-.5px}
.header-right{display:flex;gap:8px}
.icon-btn{background:var(--card2);border:none;color:var(--text);width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer}

/* PHASE BANNER */
.phase-banner{margin:12px 16px 0;border-radius:14px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.phase-strength{background:#e8ff4712;border:1px solid #e8ff4730}
.phase-hypertrophy{background:#ff6b3512;border:1px solid #ff6b3530}
.phase-deload{background:#60a5fa12;border:1px solid #60a5fa30}
.phase-type{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:2px}
.phase-strength .phase-type{color:var(--accent)}
.phase-hypertrophy .phase-type{color:var(--accent2)}
.phase-deload .phase-type{color:var(--blue)}
.phase-week{font-size:11px;color:var(--muted)}
.phase-reps{font-size:13px;font-weight:700;text-align:right}
.phase-change{font-size:11px;color:var(--muted);text-align:right;margin-top:1px}

/* TIMER */
.timer-bar{position:fixed;top:57px;left:0;right:0;z-index:99;background:var(--card);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;justify-content:space-between;transform:translateY(-100%);transition:transform .3s}
.timer-bar.visible{transform:translateY(0)}
.timer-label{font-size:11px;color:var(--muted)}
.timer-count{font-size:26px;font-weight:800;font-variant-numeric:tabular-nums;color:var(--accent)}
.timer-stop{background:var(--card3);border:none;color:var(--text);padding:6px 14px;border-radius:8px;font-weight:600;cursor:pointer;font-size:13px}

/* NAV */
.nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid var(--border);display:flex;z-index:100}
.nav-btn{flex:1;padding:9px 4px 14px;background:none;border:none;color:var(--muted);font-size:10px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;transition:color .2s}
.nav-btn.active{color:var(--accent)}
.nav-btn svg{width:21px;height:21px}

/* PAGES */
.page{display:none;padding:12px 16px 90px}
.page.active{display:block}
.section-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;margin-top:4px}

/* TODAY */
.day-selector{display:flex;gap:6px;margin-top:12px}
.day-sel-btn{flex:1;padding:8px 4px;border-radius:10px;border:1px solid var(--border);background:var(--card2);color:var(--muted);font-size:13px;font-weight:700;cursor:pointer;transition:all .15s}
.day-sel-btn.active-a{background:#e8ff4720;border-color:#e8ff4750;color:var(--accent)}
.day-sel-btn.active-b{background:#ff6b3520;border-color:#ff6b3550;color:var(--accent2)}
.day-sel-btn.active-c{background:#7c3aed20;border-color:#7c3aed50;color:var(--purple)}
.day-sel-btn.active-d{background:#0ea5e920;border-color:#0ea5e950;color:#38bdf8}
.day-badge{display:inline-flex;align-items:center;gap:6px;font-weight:700;font-size:12px;padding:4px 10px;border-radius:20px;margin-bottom:10px;margin-top:12px}
.badge-a{background:#e8ff4720;color:var(--accent)}
.badge-b{background:#ff6b3520;color:var(--accent2)}
.badge-c{background:#7c3aed20;color:var(--purple)}
.badge-d{background:#0ea5e920;color:#38bdf8}
.workout-title{font-size:21px;font-weight:800;margin-bottom:3px}
.workout-sub{color:var(--muted);font-size:13px;margin-bottom:16px}

/* EXERCISE CARD */
.exercise-card{background:var(--card);border-radius:14px;margin-bottom:8px;overflow:hidden}
.exercise-header{padding:13px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;gap:8px}
.exercise-header-left{flex:1;min-width:0}
.exercise-name{font-weight:600;font-size:14px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.exercise-meta{font-size:11px;color:var(--muted);margin-top:2px}
.exercise-header-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.swap-btn{background:var(--card2);border:1px solid var(--border);color:var(--muted);width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;flex-shrink:0}
.swap-btn:active{background:var(--card3)}
.chevron{font-size:11px;color:var(--muted);transition:transform .2s}
.chevron.open{transform:rotate(180deg)}
.exercise-tag{font-size:9px;padding:2px 5px;border-radius:5px;font-weight:700;white-space:nowrap}
.tag-caution{background:#ff6b3520;color:var(--accent2)}
.tag-rehab{background:#4ade8020;color:var(--green)}

/* SETS */
.exercise-body{padding:0 14px 14px;border-top:1px solid var(--border);display:none}
.exercise-body.open{display:block}
.sets-header{display:grid;grid-template-columns:24px 1fr 1fr 34px;gap:6px;color:var(--muted);font-size:10px;padding:10px 0 6px;text-align:center}
.set-row{display:grid;grid-template-columns:24px 1fr 1fr 34px;gap:6px;align-items:center;margin-bottom:6px}
.set-num{color:var(--muted);font-size:12px;text-align:center;font-weight:600}
.set-input{background:var(--card2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:15px;padding:7px 4px;text-align:center;width:100%;-webkit-appearance:none}
.set-input:focus{outline:none;border-color:var(--accent)}
.set-input.no-weight{opacity:.3;pointer-events:none}
.set-done{width:30px;height:30px;border-radius:8px;border:2px solid var(--border);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .15s;margin:0 auto}
.set-done.checked{background:var(--green);border-color:var(--green)}
.add-set-btn{width:100%;background:transparent;border:1px dashed var(--border);border-radius:8px;color:var(--muted);padding:7px;margin-top:6px;cursor:pointer;font-size:12px}
.note-box{background:#e8ff4708;border-left:2px solid #e8ff4740;border-radius:0 8px 8px 0;padding:7px 10px;font-size:11px;color:#aaa;margin-top:8px;line-height:1.6}
.note-box.note-caution{background:#ff6b3508;border-left-color:#ff6b3540}
.note-box.note-rehab{background:#4ade8008;border-left-color:#4ade8040}

.finish-btn{width:100%;background:var(--accent);color:#000;border:none;border-radius:14px;padding:15px;font-size:15px;font-weight:800;cursor:pointer;margin-top:14px}
.finish-btn:active{opacity:.85}

/* PROGRAM PAGE */
.program-day{background:var(--card);border-radius:14px;margin-bottom:10px;overflow:hidden}
.program-day-header{padding:14px;display:flex;align-items:center;gap:12px;cursor:pointer}
.day-circle{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex-shrink:0}
.circ-a{background:#e8ff4720;color:var(--accent)}
.circ-b{background:#ff6b3520;color:var(--accent2)}
.circ-c{background:#7c3aed20;color:var(--purple)}
.circ-d{background:#0ea5e920;color:#38bdf8}
.program-day-body{padding:0 14px 14px;border-top:1px solid var(--border);display:none}
.program-day-body.open{display:block}
.prog-ex{padding:9px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start}
.prog-ex:last-child{border-bottom:none}
.prog-ex-name{font-size:13px;font-weight:500}
.prog-ex-alt{font-size:11px;color:var(--muted);margin-top:2px}
.prog-ex-sets{font-size:12px;font-weight:700;color:var(--accent);white-space:nowrap;margin-left:8px}
.info-card{background:var(--card);border-radius:14px;padding:14px;margin-bottom:10px;font-size:13px;color:var(--muted);line-height:1.7}
.info-card b{color:var(--text)}

/* HISTORY */
.history-item{background:var(--card);border-radius:14px;padding:14px;margin-bottom:8px}
.history-date{font-size:11px;color:var(--muted);margin-bottom:3px;display:flex;align-items:center;gap:6px}
.history-phase-badge{font-size:9px;padding:2px 6px;border-radius:5px;font-weight:700}
.badge-strength{background:#e8ff4720;color:var(--accent)}
.badge-hypertrophy{background:#ff6b3520;color:var(--accent2)}
.badge-deload{background:#60a5fa20;color:var(--blue)}
.history-title{font-weight:700;font-size:15px;margin-bottom:8px}
.history-stats{display:flex;gap:14px;flex-wrap:wrap}
.history-stat{font-size:12px;color:var(--muted)}
.history-stat span{color:var(--text);font-weight:600}
.history-actions{display:flex;gap:8px;margin-bottom:16px}
.action-btn{flex:1;background:var(--card);border:1px solid var(--border);color:var(--text);padding:10px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
.action-btn:active{background:var(--card2)}
.empty-state{text-align:center;padding:50px 20px;color:var(--muted)}
.empty-state .emoji{font-size:44px;margin-bottom:10px}

/* PROGRESS */
.progress-select{background:var(--card);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:10px;font-size:14px;width:100%;margin-bottom:14px}
.pr-badge{background:var(--card);border-radius:14px;padding:14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.pr-name{font-size:14px;font-weight:600}
.pr-weight{font-size:22px;font-weight:800;color:var(--accent)}
.pr-sub{font-size:11px;color:var(--muted);margin-top:1px}
.chart-card{background:var(--card);border-radius:14px;padding:14px;margin-bottom:12px}
canvas{width:100%!important;display:block}

/* MODALS */
.modal-overlay{position:fixed;inset:0;background:#000b;z-index:200;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--card);border-radius:22px 22px 0 0;padding:20px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto}
.modal h2{font-size:18px;font-weight:800;margin-bottom:14px}
.modal-close{width:100%;background:var(--card2);border:none;color:var(--text);padding:13px;border-radius:12px;font-size:14px;cursor:pointer;margin-top:8px}
.modal-close:active{background:var(--card3)}
.modal-row{display:flex;justify-content:space-between;margin-bottom:9px;font-size:14px}
.modal-row span:last-child{font-weight:700;color:var(--accent)}

/* SWAP MODAL */
.swap-option{padding:13px 14px;border-radius:12px;margin-bottom:6px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;background:var(--card2)}
.swap-option:active{background:var(--card3)}
.swap-option.selected{background:#e8ff4715;border:1px solid #e8ff4740}
.swap-option-name{font-size:14px;font-weight:500}
.swap-option-tag{font-size:10px}
.swap-check{font-size:16px;color:var(--accent)}

/* PHASE MODAL */
.phase-option{padding:13px 14px;border-radius:12px;margin-bottom:6px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;background:var(--card2)}
.phase-option.selected-strength{background:#e8ff4715;border:1px solid #e8ff4730}
.phase-option.selected-hypertrophy{background:#ff6b3515;border:1px solid #ff6b3530}
.phase-option:active{background:var(--card3)}
.phase-opt-title{font-size:14px;font-weight:700}
.phase-opt-sub{font-size:11px;color:var(--muted);margin-top:2px}
.week-row{display:flex;align-items:center;gap:12px;margin:12px 0}
.week-btn{width:36px;height:36px;border-radius:10px;background:var(--card2);border:none;color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.week-display{flex:1;text-align:center;font-size:15px;font-weight:700}

/* CONFIRM MODAL */
.confirm-text{font-size:14px;color:var(--muted);margin-bottom:16px;line-height:1.6}
.confirm-btns{display:flex;gap:8px}
.confirm-yes{flex:1;background:var(--accent2);border:none;color:#fff;padding:12px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer}
.confirm-no{flex:1;background:var(--card2);border:none;color:var(--text);padding:12px;border-radius:12px;font-size:14px;cursor:pointer}
</style>
</head>
<body>

<div class="header">
  <h1>💪 Gym Tracker</h1>
  <div class="header-right">
    <button class="icon-btn" onclick="toggleManualTimer()">⏱</button>
  </div>
</div>

<div class="timer-bar" id="timerBar">
  <div>
    <div class="timer-label">Отдых</div>
    <div class="timer-count" id="timerCount">0:00</div>
  </div>
  <button class="timer-stop" onclick="stopTimer()">Стоп</button>
</div>

<!-- TODAY -->
<div class="page active" id="page-today">
  <div id="today-content"></div>
</div>

<!-- PROGRAM -->
<div class="page" id="page-program">
  <div id="program-content"></div>
</div>

<!-- HISTORY -->
<div class="page" id="page-history">
  <div class="history-actions">
    <button class="action-btn" onclick="exportJSON()">📤 Экспорт</button>
    <button class="action-btn" onclick="document.getElementById('importInput').click()">📥 Импорт</button>
    <button class="action-btn" style="color:var(--red);border-color:#f8717130" onclick="confirmClearHistory()">🗑</button>
  </div>
  <input type="file" id="importInput" accept=".json" style="display:none" onchange="handleImport(event)">
  <div id="history-content"></div>
</div>

<!-- PROGRESS -->
<div class="page" id="page-progress">
  <div class="section-title">Личные рекорды</div>
  <div id="pr-content"></div>
  <div class="section-title" style="margin-top:10px">График</div>
  <select class="progress-select" id="progressSelect" onchange="renderChart()"></select>
  <div class="chart-card">
    <canvas id="progressCanvas" height="180"></canvas>
  </div>
</div>

<nav class="nav">
  <button class="nav-btn active" onclick="showPage('today',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
    Сегодня
  </button>
  <button class="nav-btn" onclick="showPage('program',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
    Программа
  </button>
  <button class="nav-btn" onclick="showPage('history',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    История
  </button>
  <button class="nav-btn" onclick="showPage('progress',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    Прогресс
  </button>
</nav>

<!-- FINISH MODAL -->
<div class="modal-overlay" id="finishModal">
  <div class="modal">
    <h2>🎉 Готово!</h2>
    <div id="finish-stats"></div>
    <button class="modal-close" onclick="closeFinishModal()">Закрыть</button>
  </div>
</div>

<!-- SWAP MODAL -->
<div class="modal-overlay" id="swapModal">
  <div class="modal">
    <h2>Выбрать упражнение</h2>
    <div id="swap-options"></div>
    <button class="modal-close" onclick="closeModal('swapModal')">Отмена</button>
  </div>
</div>

<!-- PHASE MODAL -->
<div class="modal-overlay" id="phaseModal">
  <div class="modal">
    <h2>Настройка блока</h2>
    <div id="phase-modal-content"></div>
    <button class="modal-close" onclick="closeModal('phaseModal')">Готово</button>
  </div>
</div>

<!-- CONFIRM MODAL -->
<div class="modal-overlay" id="confirmModal">
  <div class="modal">
    <h2 id="confirm-title"></h2>
    <div class="confirm-text" id="confirm-text"></div>
    <div class="confirm-btns">
      <button class="confirm-yes" id="confirm-yes">Да</button>
      <button class="confirm-no" onclick="closeModal('confirmModal')">Отмена</button>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════
// PROGRAM DATA
// ════════════════════════════════════════════════════════
// reps = hypertrophy / repsS = strength (omit if same)
// noWeight = true for bodyweight/timed exercises
// alternatives = [{name, tag?, note?}]

const PROGRAM = [
  {
    id: 'A', name: 'День A — Ноги + Кор',
    focus: 'Сила ног, коррекция таза',
    badgeClass: 'badge-a', circClass: 'circ-a',
    exercises: [
      { name: 'Приседания со штангой', sets: 4, reps: '6–8', repsS: '4–5', rest: 180,
        note: 'Следи за нейтральным положением таза. Не заваливайся вперёд.', alternatives: [] },
      { name: 'Румынская тяга', sets: 3, reps: '8–10', repsS: '5–6', rest: 150,
        note: 'Тянись ягодицами назад, нейтральный позвоночник. Контроль поясницы.', tag: 'rehab', alternatives: [] },
      { name: 'Сгибания ног в тренажёре', sets: 3, reps: '10–12', rest: 90, alternatives: [] },
      { name: 'Разгибания ног', sets: 3, reps: '12–15', rest: 90,
        note: 'Не разгибай полностью под нагрузкой.', alternatives: [] },
      { name: 'Dead Bug', sets: 3, reps: '10 (каждую сторону)', rest: 60, noWeight: true,
        note: 'Поясница прижата к полу всё время. Медленно и осознанно.', tag: 'rehab', alternatives: [] },
      { name: 'Планка', sets: 3, reps: '45–60 сек', rest: 60, noWeight: true,
        note: 'Не прогибай поясницу. Лучше короче, но с идеальной техникой.', alternatives: [] },
    ]
  },
  {
    id: 'B', name: 'День B — Грудь + Плечи + Трицепс',
    focus: 'Жим, изоляция, кор',
    badgeClass: 'badge-b', circClass: 'circ-b',
    exercises: [
      { name: 'Жим штанги лёжа', sets: 4, reps: '6–8', repsS: '4–5', rest: 180,
        note: 'Хват чуть шире плеч. Локти не шире 75° — щадит локтевой сустав.', tag: 'caution', alternatives: [] },
      { name: 'Сведения в блоке (верх груди)', sets: 3, reps: '12–15', rest: 90, alternatives: [] },
      { name: 'Махи в стороны', sets: 3, reps: '12–15', rest: 60,
        alternatives: [
          { name: 'Махи в кроссовере (одна рука)' },
          { name: 'Бабочка в тренажёре' },
        ]},
      { name: 'Трицепс на блоке (верёвка)', sets: 3, reps: '12–15', rest: 60,
        note: 'Не разгибай локоть полностью под нагрузкой.', tag: 'caution',
        alternatives: [
          { name: 'Французский жим в блоке', tag: 'caution', note: 'Аккуратно с локтем в нижней точке.' },
          { name: 'Французский жим свободный', tag: 'caution', note: 'Максимальная нагрузка на локоть — только если нет дискомфорта.' },
        ]},
      { name: 'Ролик (ab wheel)', sets: 3, reps: '8–10', rest: 60, noWeight: true,
        note: 'Поясница нейтральная. Можно с колен пока нет уверенной формы.', alternatives: [] },
      { name: 'Скручивания', sets: 3, reps: '15–20', rest: 60, noWeight: true, alternatives: [] },
    ]
  },
  {
    id: 'C', name: 'День C — Спина + Бицепс + Плечи',
    focus: 'Тяги, ширина и толщина спины',
    badgeClass: 'badge-c', circClass: 'circ-c',
    exercises: [
      { name: 'Подтягивания', sets: 4, reps: '6–8', repsS: '5–6', rest: 180,

// ════════════════════════════════════════════════════════
// STORAGE HELPERS
// ════════════════════════════════════════════════════════
const $ = id => document.getElementById(id);
function gls(key, def) { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; } catch { return def; } }
function sls(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }

function getHistory() { return gls('gym_history', []); }
function saveHistory(h) { sls('gym_history', h); }
function getPRs() { return gls('gym_prs', {}); }
function savePRs(p) { sls('gym_prs', p); }
function getNextDay() { return gls('gym_next_day', 0); }
function setNextDay(i) { sls('gym_next_day', i); }
function getPhase() {
  return gls('gym_phase', { type: 'hypertrophy', blockStart: new Date().toISOString().split('T')[0] });
}
function savePhase(p) { sls('gym_phase', p); }

function getPhaseInfo() {
  const p = getPhase();
  const start = new Date(p.blockStart);
  const now = new Date();
  const weekNum = Math.floor((now - start) / (7 * 24 * 3600 * 1000)) + 1;
  const isDeload = weekNum >= 5;
  return { type: p.type, blockStart: p.blockStart, weekNum: Math.min(weekNum, 5), isDeload };
}

// ════════════════════════════════════════════════════════
// SESSION STATE
// ════════════════════════════════════════════════════════
let session = {
  dayIdx: 0,
  sets: {},          // exSlotKey -> [{weight, reps, done}]
  selections: {},    // exIdx -> altIdx (0=main, 1+=alt)
  startTime: null,
};

function exSlotKey(exIdx) { return `${session.dayIdx}_${exIdx}`; }

function getSelectedEx(exIdx) {
  const ex = PROGRAM[session.dayIdx].exercises[exIdx];
  const sel = session.selections[exIdx] || 0;
  if (sel === 0) return ex;
  const alt = ex.alternatives[sel - 1];
  return { ...ex, ...alt, name: alt.name };
}

// NAVIGATION
// ════════════════════════════════════════════════════════
function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  $('page-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'history') renderHistory();
  if (name === 'progress') renderProgress();
}

function closeModal(id) { $(id).classList.remove('open'); }

// ════════════════════════════════════════════════════════
// TODAY PAGE
// ════════════════════════════════════════════════════════
function initToday() {
  session.dayIdx = getNextDay();
  session.selections = {};
  session.sets = {};
  session.startTime = Date.now();

  const day = PROGRAM[session.dayIdx];
  day.exercises.forEach((ex, i) => {
    session.sets[exSlotKey(i)] = Array.from({ length: ex.sets }, () =>
      ({ weight: '', reps: '', done: false }));
  });
  renderToday();
}

function renderToday() {
  const day = PROGRAM[session.dayIdx];
  const phase = getPhaseInfo();
  const now = new Date();
  const DAYS = ['вс','пн','вт','ср','чт','пт','сб'];
  const MONTHS = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];

  let phaseClass = phase.isDeload ? 'phase-deload' : (phase.type === 'strength' ? 'phase-strength' : 'phase-hypertrophy');
  let phaseName = phase.isDeload ? 'РАЗГРУЗОЧНАЯ НЕДЕЛЯ' : (phase.type === 'strength' ? 'СИЛОВОЙ БЛОК' : 'ГИПЕРТРОФИЯ');
  let phaseReps = phase.isDeload ? '−30% от рабочих весов' : (phase.type === 'strength' ? 'Целевые: 4–6 повт' : 'Целевые: 8–12 повт');

  const dayClasses = ['a','b','c','d'];
  const daySelectorHtml = `<div class="day-selector">${PROGRAM.map((d,i) => {
    const activeClass = i === session.dayIdx ? `active-${dayClasses[i]}` : '';
    return `<button class="day-sel-btn ${activeClass}" onclick="switchDay(${i})">${d.id}</button>`;
  }).join('')}</div>`;

  let html = `
    <div class="phase-banner ${phaseClass}" onclick="openPhaseModal()">
      <div>
        <div class="phase-type">${phaseName}</div>
        <div class="phase-week">Неделя ${phase.weekNum} · нажми чтобы изменить</div>
      </div>
      <div>
        <div class="phase-reps">${phaseReps}</div>
      </div>
    </div>
    ${daySelectorHtml}
    <div class="${day.badgeClass} day-badge">${day.id} · ${DAYS[now.getDay()]}, ${now.getDate()} ${MONTHS[now.getMonth()]}</div>
    <div class="workout-title">${day.name}</div>
    <div class="workout-sub">${day.focus}${day.optional ? ' (опциональный)' : ''}</div>
  `;

  day.exercises.forEach((_, i) => {
    html += buildExerciseCard(i);
  });

  html += `<button class="finish-btn" onclick="finishWorkout()">Завершить тренировку 🏁</button>`;
  $('today-content').innerHTML = html;
}

function buildExerciseCard(exIdx) {
  const ex = getSelectedEx(exIdx);
  const phase = getPhaseInfo();
  const hasAlts = PROGRAM[session.dayIdx].exercises[exIdx].alternatives.length > 0;
  const reps = (phase.type === 'strength' && !phase.isDeload && ex.repsS) ? ex.repsS : ex.reps;
  const displayReps = phase.isDeload ? ex.reps : reps;

  const tagHtml = ex.tag === 'caution'
    ? '<span class="exercise-tag tag-caution">⚠ локоть</span>'
    : ex.tag === 'rehab' ? '<span class="exercise-tag tag-rehab">✓ таз</span>' : '';

  const swapHtml = hasAlts
    ? `<button class="swap-btn" onclick="event.stopPropagation();openSwapModal(${exIdx})">⇄</button>` : '';

  return `
    <div class="exercise-card" id="excard-${exIdx}">
      <div class="exercise-header" onclick="toggleEx(${exIdx})">
        <div class="exercise-header-left">
          <div class="exercise-name">${ex.name} ${tagHtml}</div>
          <div class="exercise-meta">${ex.sets} × ${displayReps} · ${fmtTime(ex.rest)}</div>
        </div>
        <div class="exercise-header-right">
          ${swapHtml}
          <span class="chevron" id="chev-${exIdx}">▼</span>
        </div>
      </div>
      <div class="exercise-body" id="exbody-${exIdx}">
        <div class="sets-header"><span>#</span><span>Вес кг</span><span>Повт</span><span>✓</span></div>
        <div id="sets-${exIdx}"></div>
        <button class="add-set-btn" onclick="addSet(${exIdx})">+ подход</button>
        ${ex.note ? `<div class="note-box${ex.tag === 'caution' ? ' note-caution' : ex.tag === 'rehab' ? ' note-rehab' : ''}">${ex.note}</div>` : ''}
      </div>
    </div>`;
}

function renderSets(exIdx) {
  const ex = getSelectedEx(exIdx);
  const sets = session.sets[exSlotKey(exIdx)];
  const phase = getPhaseInfo();
  const reps = (phase.type === 'strength' && !phase.isDeload && ex.repsS) ? ex.repsS : ex.reps;
  let html = '';
  sets.forEach((s, si) => {
    const wClass = ex.noWeight ? 'no-weight' : '';
    html += `
      <div class="set-row">
        <span class="set-num">${si + 1}</span>
        <input class="set-input ${wClass}" type="number" inputmode="decimal" placeholder="${ex.noWeight ? '—' : '0'}"
          value="${s.weight}" onchange="updSet(${exIdx},${si},'weight',this.value)">
        <input class="set-input" type="number" inputmode="numeric" placeholder="${reps}"
          value="${s.reps}" onchange="updSet(${exIdx},${si},'reps',this.value)">
        <button class="set-done ${s.done ? 'checked' : ''}" onclick="toggleDone(${exIdx},${si})">${s.done ? '✓' : ''}</button>
      </div>`;
  });
  $('sets-' + exIdx).innerHTML = html;
}

function updSet(exIdx, si, field, val) {
  session.sets[exSlotKey(exIdx)][si][field] = val;
}

function toggleDone(exIdx, si) {
  const set = session.sets[exSlotKey(exIdx)][si];
  set.done = !set.done;
  if (set.done) startRestTimer(getSelectedEx(exIdx).rest);
  renderSets(exIdx);
}

function addSet(exIdx) {
  const ex = getSelectedEx(exIdx);
  session.sets[exSlotKey(exIdx)].push({ weight: '', reps: '', done: false });
  renderSets(exIdx);
}

function toggleEx(i) {
  const body = $('exbody-' + i);
  const chev = $('chev-' + i);
  const open = body.classList.toggle('open');
  chev.classList.toggle('open', open);
  if (open) renderSets(i);
}

function finishWorkout() {
  const day = PROGRAM[session.dayIdx];
  const phase = getPhaseInfo();
  const duration = Math.round((Date.now() - session.startTime) / 60000);
  let totalSets = 0, totalVol = 0;

  const exercisesLog = day.exercises.map((_, i) => {
    const ex = getSelectedEx(i);
    const doneSets = session.sets[exSlotKey(i)].filter(s => s.done);
    totalSets += doneSets.length;
    doneSets.forEach(s => { totalVol += (parseFloat(s.weight) || 0) * (parseInt(s.reps) || 0); });
    return { name: ex.name, sets: doneSets };
  });

  const entry = {
    date: new Date().toISOString(),
    dayId: day.id,
    dayName: day.name,
    phase: phase.isDeload ? 'deload' : phase.type,
    phaseWeek: phase.weekNum,
    duration,
    totalSets,
    totalVol: Math.round(totalVol),
    exercises: exercisesLog,
  };

  const history = getHistory();
  history.unshift(entry);
  saveHistory(history);
  updatePRs(exercisesLog);
  setNextDay((session.dayIdx + 1) % 4);

  const nextDay = PROGRAM[(session.dayIdx + 1) % 4];
  $('finish-stats').innerHTML = `
    <div class="modal-row"><span>Длительность</span><span>${duration} мин</span></div>
    <div class="modal-row"><span>Подходов</span><span>${totalSets}</span></div>
    <div class="modal-row"><span>Объём</span><span>${totalVol.toLocaleString('ru')} кг</span></div>
    <div class="modal-row"><span>Следующий день</span><span>${nextDay.id} — ${nextDay.id === 'D' ? 'опц.' : ''}</span></div>
  `;
  $('finishModal').classList.add('open');
}

function closeFinishModal() {
  closeModal('finishModal');
  initToday();
}

function switchDay(idx) {
  session.dayIdx = idx;
  session.selections = {};
  session.sets = {};
  session.startTime = Date.now();
  const day = PROGRAM[idx];
  day.exercises.forEach((ex, i) => {
    session.sets[exSlotKey(i)] = Array.from({ length: ex.sets }, () => ({ weight: '', reps: '', done: false }));
  });
  renderToday();
}

function confirmClearHistory() {
  showConfirm(
    'Очистить историю?',
    'Все тренировки и личные рекорды будут удалены. Это действие нельзя отменить.',
    () => {
      saveHistory([]);
      savePRs({});
      closeModal('confirmModal');
      renderHistory();
    }
  );
}

function updatePRs(exercisesLog) {
  const prs = getPRs();
  exercisesLog.forEach(ex => {
    ex.sets.forEach(s => {
      const w = parseFloat(s.weight) || 0;
      if (w > 0 && (!prs[ex.name] || w > prs[ex.name].weight)) {
        prs[ex.name] = { weight: w, date: new Date().toLocaleDateString('ru') };
      }
    });
  });
  savePRs(prs);
}

// ════════════════════════════════════════════════════════
// SWAP MODAL
// ════════════════════════════════════════════════════════
let swapTargetIdx = -1;

function openSwapModal(exIdx) {
  swapTargetIdx = exIdx;
  const baseEx = PROGRAM[session.dayIdx].exercises[exIdx];
  const currentSel = session.selections[exIdx] || 0;
  const options = [{ name: baseEx.name, tag: baseEx.tag, note: null }, ...baseEx.alternatives];

  let html = '';
  options.forEach((opt, i) => {
    const tagHtml = opt.tag === 'caution'
      ? '<span class="exercise-tag tag-caution">⚠ локоть</span>'
      : opt.tag === 'rehab' ? '<span class="exercise-tag tag-rehab">✓ таз</span>' : '';
    const checkHtml = i === currentSel ? '<span class="swap-check">✓</span>' : '';
    html += `
      <div class="swap-option ${i === currentSel ? 'selected' : ''}" onclick="selectAlt(${i})">
        <div>
          <div class="swap-option-name">${opt.name} ${tagHtml}</div>
          ${opt.note ? `<div style="font-size:11px;color:var(--muted);margin-top:2px">${opt.note}</div>` : ''}
        </div>
        ${checkHtml}
      </div>`;
  });
  $('swap-options').innerHTML = html;
  $('swapModal').classList.add('open');
}

function selectAlt(altIdx) {
  session.selections[swapTargetIdx] = altIdx;
  closeModal('swapModal');
  // Rebuild the card
  const card = $('excard-' + swapTargetIdx);
  const wasOpen = $('exbody-' + swapTargetIdx).classList.contains('open');
  card.outerHTML = buildExerciseCard(swapTargetIdx);
  if (wasOpen) {
    $('exbody-' + swapTargetIdx).classList.add('open');
    $('chev-' + swapTargetIdx).classList.add('open');
    renderSets(swapTargetIdx);
  }
}

// ════════════════════════════════════════════════════════
function openPhaseModal() {
  renderPhaseModal();
  $('phaseModal').classList.add('open');
}

function renderPhaseModal() {
  const phase = getPhase();
  const info = getPhaseInfo();

  const opts = [
    { type: 'strength', title: 'Силовой блок', sub: '3–6 повторений · тяжёлые веса · 4–6 нед' },
    { type: 'hypertrophy', title: 'Гипертрофия', sub: '8–12 повторений · умеренные веса · 4–6 нед' },
  ];

  let html = '';
  opts.forEach(o => {
    const sel = phase.type === o.type ? (o.type === 'strength' ? 'selected-strength' : 'selected-hypertrophy') : '';
    html += `
      <div class="phase-option ${sel}" onclick="setPhaseType('${o.type}')">
        <div>
          <div class="phase-opt-title">${o.title}</div>
          <div class="phase-opt-sub">${o.sub}</div>
        </div>
        ${phase.type === o.type ? '<span style="color:var(--accent);font-size:18px">✓</span>' : ''}
      </div>`;
  });

  html += `
    <div style="font-size:12px;color:var(--muted);margin:14px 0 6px">Неделя блока (авто + ручная коррекция)</div>
    <div class="week-row">
      <button class="week-btn" onclick="adjustWeek(-1)">−</button>
      <div class="week-display">Неделя ${info.weekNum}${info.isDeload ? ' · разгрузка' : ' из 4'}</div>
      <button class="week-btn" onclick="adjustWeek(1)">+</button>
    </div>
    <button style="width:100%;background:var(--card2);border:1px solid var(--border);color:var(--muted);padding:10px;border-radius:10px;font-size:13px;cursor:pointer;margin-top:4px" onclick="startNewBlock()">
      Начать новый блок (сброс недели)
    </button>`;

  $('phase-modal-content').innerHTML = html;
}

function setPhaseType(type) {
  const p = getPhase();
  p.type = type;
  savePhase(p);
  renderPhaseModal();
  renderToday();
}

function adjustWeek(delta) {
  const p = getPhase();
  const info = getPhaseInfo();
  const newWeek = Math.max(1, Math.min(5, info.weekNum + delta));
  // Adjust blockStart so that current week = newWeek
  const start = new Date();
  start.setDate(start.getDate() - (newWeek - 1) * 7);
  p.blockStart = start.toISOString().split('T')[0];
  savePhase(p);
  renderPhaseModal();
  renderToday();
}

function startNewBlock() {
  const p = getPhase();
  p.blockStart = new Date().toISOString().split('T')[0];
  savePhase(p);
  renderPhaseModal();
  renderToday();
}

// ════════════════════════════════════════════════════════
// TIMER
// ════════════════════════════════════════════════════════
let timerInterval = null, timerSec = 0, timerRunning = false;

function startRestTimer(seconds) {
  timerSec = seconds;
  timerRunning = true;
  $('timerBar').classList.add('visible');
  clearInterval(timerInterval);
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    timerSec--;
    updateTimerDisplay();
    if (timerSec === 0) { if (navigator.vibrate) navigator.vibrate([200,100,200]); }
    if (timerSec < -60) stopTimer();
  }, 1000);
}

function toggleManualTimer() {
  timerRunning ? stopTimer() : startRestTimer(120);
}

function stopTimer() {
  clearInterval(timerInterval);
  timerRunning = false;
  $('timerBar').classList.remove('visible');
}

function updateTimerDisplay() {
  const abs = Math.abs(timerSec);
  const m = Math.floor(abs / 60), s = abs % 60;
  const sign = timerSec < 0 ? '+' : '';
  $('timerCount').textContent = `${sign}${m}:${s.toString().padStart(2, '0')}`;
  $('timerCount').style.color = timerSec < 0 ? 'var(--accent2)' : 'var(--accent)';
}

function fmtTime(s) { return s >= 60 ? `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}` : `${s}с`; }

// ════════════════════════════════════════════════════════
// HISTORY PAGE
// ════════════════════════════════════════════════════════
function renderHistory() {
  const history = getHistory();
  if (!history.length) {
    $('history-content').innerHTML = `<div class="empty-state"><div class="emoji">📋</div><div>Здесь появятся твои тренировки</div></div>`;
    return;
  }
  const phaseLabels = { strength: 'Сила', hypertrophy: 'Гипертрофия', deload: 'Разгрузка' };
  const phaseBadge = { strength: 'badge-strength', hypertrophy: 'badge-hypertrophy', deload: 'badge-deload' };
  let html = '';
  history.forEach(entry => {
    const d = new Date(entry.date);
    const dateStr = d.toLocaleDateString('ru', { day: 'numeric', month: 'long', weekday: 'short' });
    const phaseHtml = entry.phase
      ? `<span class="history-phase-badge ${phaseBadge[entry.phase] || ''}">${phaseLabels[entry.phase] || ''} ${entry.phaseWeek ? '·нед '+entry.phaseWeek : ''}</span>` : '';
    html += `
      <div class="history-item">
        <div class="history-date">${dateStr} ${phaseHtml}</div>
        <div class="history-title">${entry.dayName}</div>
        <div class="history-stats">
          <div class="history-stat">Время <span>${entry.duration} мин</span></div>
          <div class="history-stat">Подходов <span>${entry.totalSets}</span></div>
          <div class="history-stat">Объём <span>${(entry.totalVol || 0).toLocaleString('ru')} кг</span></div>
        </div>
      </div>`;
  });
  $('history-content').innerHTML = html;
}

// ════════════════════════════════════════════════════════
// EXPORT / IMPORT
// ════════════════════════════════════════════════════════
function exportJSON() {
  const data = {
    version: 2,
    exported: new Date().toISOString(),
    history: getHistory(),
    prs: getPRs(),
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `gym_backup_${new Date().toISOString().split('T')[0]}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function handleImport(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.history) throw new Error('Неверный формат');
      showConfirm(
        'Импорт данных',
        `Найдено ${data.history.length} тренировок. Добавить к существующим?`,
        () => {
          const existing = getHistory();
          const existingDates = new Set(existing.map(h => h.date));
          const newEntries = data.history.filter(h => !existingDates.has(h.date));
          const merged = [...existing, ...newEntries].sort((a, b) => new Date(b.date) - new Date(a.date));
          saveHistory(merged);
          if (data.prs) {
            const prs = getPRs();
            Object.entries(data.prs).forEach(([k, v]) => {
              if (!prs[k] || v.weight > prs[k].weight) prs[k] = v;
            });
            savePRs(prs);
          }
          renderHistory();
          closeModal('confirmModal');
        }
      );
    } catch { alert('Ошибка импорта: неверный формат файла'); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function showConfirm(title, text, onYes) {
  $('confirm-title').textContent = title;
  $('confirm-text').textContent = text;
  $('confirm-yes').onclick = onYes;
  $('confirmModal').classList.add('open');
}

// ════════════════════════════════════════════════════════
// PROGRESS PAGE
// ════════════════════════════════════════════════════════
function renderProgress() {
  const prs = getPRs();
  let prHtml = '';
  if (!Object.keys(prs).length) {
    prHtml = '<div style="color:var(--muted);font-size:13px;margin-bottom:14px">Рекорды появятся после первых тренировок</div>';
  } else {
    Object.entries(prs).sort((a, b) => b[1].weight - a[1].weight).forEach(([name, data]) => {
      prHtml += `
        <div class="pr-badge">
          <div>
            <div class="pr-name">${name}</div>
            <div class="pr-sub">${data.date}</div>
          </div>
          <div class="pr-weight">${data.weight} кг</div>
        </div>`;
    });
  }
  $('pr-content').innerHTML = prHtml;

  const history = getHistory();
  const exNames = new Set();
  history.forEach(e => e.exercises.forEach(ex => { if (ex.sets.length) exNames.add(ex.name); }));
  const sel = $('progressSelect');
  sel.innerHTML = [...exNames].map(n => `<option value="${n}">${n}</option>`).join('');
  if (exNames.size) renderChart();
}

function renderChart() {
  const history = getHistory();
  const exName = $('progressSelect').value;
  const points = [];
  [...history].reverse().forEach(entry => {
    const ex = entry.exercises.find(e => e.name === exName);
    if (ex && ex.sets.length) {
      const maxW = Math.max(...ex.sets.map(s => parseFloat(s.weight) || 0));
      if (maxW > 0) {
        const d = new Date(entry.date);
        points.push({ label: `${d.getDate()}.${d.getMonth()+1}`, weight: maxW, phase: entry.phase });
      }
    }
  });

  const canvas = $('progressCanvas');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.offsetWidth;
  const H = 180;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, W, H);

  if (points.length < 2) {
    ctx.fillStyle = '#666';
    ctx.font = '13px -apple-system,sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Нужно минимум 2 записи', W/2, H/2);
    return;
  }

  const pad = { t: 20, r: 16, b: 28, l: 38 };
  const gW = W - pad.l - pad.r, gH = H - pad.t - pad.b;
  const minW = Math.min(...points.map(p => p.weight)) * 0.97;
  const maxW = Math.max(...points.map(p => p.weight)) * 1.03;
  const px = i => pad.l + (i / (points.length - 1)) * gW;
  const py = w => pad.t + gH - ((w - minW) / (maxW - minW || 1)) * gH;

  // gradient
  const grad = ctx.createLinearGradient(0, pad.t, 0, pad.t + gH);
  grad.addColorStop(0, 'rgba(232,255,71,.25)');
  grad.addColorStop(1, 'rgba(232,255,71,0)');
  ctx.beginPath();
  ctx.moveTo(px(0), py(points[0].weight));
  points.forEach((p, i) => { if (i > 0) ctx.lineTo(px(i), py(p.weight)); });
  ctx.lineTo(px(points.length-1), pad.t + gH);
  ctx.lineTo(px(0), pad.t + gH);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // line
  ctx.beginPath();
  ctx.moveTo(px(0), py(points[0].weight));
  points.forEach((p, i) => { if (i > 0) ctx.lineTo(px(i), py(p.weight)); });
  ctx.strokeStyle = '#e8ff47';
  ctx.lineWidth = 2;
  ctx.stroke();

  // dots
  points.forEach((p, i) => {
    ctx.beginPath();
    ctx.arc(px(i), py(p.weight), 3.5, 0, Math.PI*2);
    ctx.fillStyle = p.phase === 'strength' ? '#e8ff47' : p.phase === 'deload' ? '#60a5fa' : '#ff6b35';
    ctx.fill();
  });

  // x labels
  ctx.fillStyle = '#666';
  ctx.font = `11px -apple-system,sans-serif`;
  ctx.textAlign = 'center';
  const step = Math.ceil(points.length / 6);
  points.forEach((p, i) => {
    if (i % step === 0 || i === points.length - 1) ctx.fillText(p.label, px(i), H - 6);
  });

  // y labels
  ctx.textAlign = 'right';
  [minW, maxW].forEach(w => ctx.fillText(w.toFixed(1), pad.l - 4, py(w) + 4));
}

// ════════════════════════════════════════════════════════

initToday();
renderProgram();
